<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; }
.header { background: white; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.header h1 { font-size: 20px; color: #1e6b4d; font-weight: 700; }
.header button { padding: 8px 16px; background: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
.header button:hover { background: #991b1b; }
.dashboard { margin-top: 70px; padding: 20px; }
.content { max-width: 1400px; margin: 0 auto; }
.section { background: white; padding: 24px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.section h2 { font-size: 20px; color: #222; margin-bottom: 16px; font-weight: 700; }
.section p { font-size: 14px; color: #666; line-height: 1.6; }
table { width: 100%; border-collapse: collapse; margin-top: 16px; }
table th { background: #f3f4f6; padding: 12px; text-align: left; font-size: 13px; font-weight: 600; color: #333; border-bottom: 2px solid #e5e7eb; }
table td { padding: 12px; border-bottom: 1px solid #e5e7eb; font-size: 13px; color: #666; }
table tr:hover { background: #f9fafb; }
.btn-group { display: flex; gap: 8px; margin-top: 16px; }
.btn { padding: 10px 16px; background: #1e6b4d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn:hover { background: #175a40; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: #333; margin-bottom: 4px; }
.form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #1e6b4d; box-shadow: 0 0 0 3px rgba(30, 107, 77, 0.1); }
</style>
</head>
<body>
<div class="header">
  <h1>📊 SIMASET Dashboard</h1>
  <button onclick="handleLogout()">Logout</button>
</div>

<div class="dashboard">
  <div class="content">
    <div class="section">
      <h2>Selamat Datang di Dashboard SIMASET</h2>
      <p>Sistem Informasi Manajemen Aset Universitas Yapis Papua</p>
      <p style="margin-top: 12px;">User: <strong id="userName">Loading...</strong></p>
    </div>

    <div class="section">
      <h2>Tambah Barang Aset Baru</h2>
      <form id="formTambahBarang" onsubmit="handleTambahBarang(event)">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label>Nama Barang</label>
            <input type="text" id="namaBarang" required>
          </div>
          <div class="form-group">
            <label>Kategori</label>
            <input type="text" id="kategoriBg" required>
          </div>
          <div class="form-group">
            <label>Ruangan</label>
            <input type="text" id="ruanganBg" required>
          </div>
          <div class="form-group">
            <label>Kondisi</label>
            <select id="kondisiBg" required>
              <option value="">Pilih Kondisi</option>
              <option value="Baik">Baik</option>
              <option value="Rusak Ringan">Rusak Ringan</option>
              <option value="Rusak Berat">Rusak Berat</option>
            </select>
          </div>
          <div class="form-group">
            <label>Jumlah</label>
            <input type="number" id="jumlahBg" required>
          </div>
          <div class="form-group">
            <label>Harga Satuan</label>
            <input type="number" id="hargaBg" required>
          </div>
        </div>
        <button type="submit" class="btn">Tambah Barang</button>
      </form>
    </div>

    <div class="section">
      <h2>Daftar Barang Aset</h2>
      <table id="tableBarang">
        <thead>
          <tr>
            <th>No</th>
            <th>Nama Barang</th>
            <th>Kategori</th>
            <th>Ruangan</th>
            <th>Kondisi</th>
            <th>Jumlah</th>
            <th>Harga Satuan</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBarangBody">
          <tr><td colspan="8" style="text-align: center; color: #999;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const AUTH_URL = 'https://script.google.com/macros/s/AKfycbxnnI8P53u7RlEMmJrTw8x0Yid0DqxBOxiruV3IJSjorpXWB-_qr8TdIlB2AJWDYu4J/exec';
  const SHEET_ID = '1vyPBIAJNwTFLVR4tWGSZr4lSiKhfHhVvLPTbvLGxSdA'; // Ganti dengan Sheet ID kamu

  function handleLogout() {
    localStorage.removeItem('simaset_token');
    localStorage.removeItem('simaset_user');
    window.location = AUTH_URL;
  }

  // Load data saat halaman dibuka
  document.addEventListener('DOMContentLoaded', function() {
    var user = localStorage.getItem('simaset_user') || 'User';
    document.getElementById('userName').textContent = user;
    
    // Baca data barang dari Sheet (gunakan Apps Script atau fetch langsung)
    loadBarangData();
  });

  function loadBarangData() {
    // Untuk sekarang, tampilkan pesan (nanti akan terhubung ke backend)
    document.getElementById('tableBarangBody').innerHTML = '<tr><td colspan="8" style="text-align: center; color: #999;">Data akan dimuat dari Sheet</td></tr>';
  }

  function handleTambahBarang(e) {
    e.preventDefault();
    alert('Fitur tambah barang akan terhubung ke backend Apps Script');
    // Nanti bisa langsung kirim data ke backend
  }
</script>
</body>
</html>
